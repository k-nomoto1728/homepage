<body>

  <!-- ヘッダー -->

  <main>

    <div class="section">
      <h1 class="section-text">数学</h1>

    <div class="section">
      <h1 class="section-text">暗号</h1>
      <ul>
        <li><a href="">未定</a></li>
      </ul>
    </div>

    <div class="section">
      <h1 class="section-text">LaTeX</h1>
      <ul>
        <li><a href="./latex/alphabet_font/index.html">アルファベットの書体(mathbb, mathcal, etc.)マクロ</a></li>
        <li><a href="./latex/math_operator/index.html">数学作用素マクロ</a></li>

  <!-- フッター -->
  <div id="footer"></div>

  <!-- ヘッダーとフッターの読み込み -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // ヘッダーとフッターの読み込み
      Promise.all([
        fetch("../header-footer/header.html")
          .then((response) => response.text())
          .then((data) => {
            document.querySelector("#header").innerHTML = data;
          }),
        fetch("../header-footer/footer.html")
          .then((response) => response.text())
          .then((data) => {
            document.querySelector("#footer").innerHTML = data;
          })
      ]).then(initToggleMenu); // fetch完了後に初期化
    });
  
    function initToggleMenu() {
      const $button = document.querySelector('.toggle-menu-button');
      const $menu = document.querySelector('.header-nav');
      
      if ($button && $menu) {
        $button.addEventListener('click', function () {
          $menu.classList.toggle('is-show');
        });
      }
    }
  </script>

</body>

</html>
