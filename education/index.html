<!DOCTYPE html>
<html>

<head>
  
  <!-- 必須タグ -->
  <meta charset="UTF-8">
  <title>Education | NOMOTO Keiichiro</title>

  <!-- 任意タグ -->
  <meta name="author" content="野本慶一郎">
  <meta name="description" content="">

  <!-- 端末調整 -->
  <meta name="viewport" content="width=device-width">

  <!-- css -->
  <link href="/css/common.css" rel="stylesheet">
  <link href="/css/section.css" rel="stylesheet">
  <link href="/css/education.css" rel="stylesheet">

  <!-- フォント -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@400;500;700;800&family=Noto+Sans+JP:wght@100..900&family=RocknRoll+One&display=swap" rel="stylesheet">
</head>

<body>

  <!-- ヘッダー -->
  <div id="header"></div>

  <main>
    <div class="section">
      <h1 class="section-text">2024年度 後期</h1>
      <ul>
        <li><a href="/education/2024_Wed1_geometry2/index.html">幾何学2 水曜1限 (明星大学 教育学部教育学科)</a></li>
        <li><a href="/education/2024_Wed2_geometry2/index.html">幾何学2 水曜2限 (明星大学 全学共通教職・資格取得)</a></li>
      </ul>
    </div>
  </main>

  <!-- フッター -->
  <div id="footer"></div>

  <!-- ヘッダーとフッターの読み込み -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // ヘッダーとフッターの読み込み
      Promise.all([
        fetch("/header-footer/header.html")
          .then((response) => response.text())
          .then((data) => {
            document.querySelector("#header").innerHTML = data;
          }),
        fetch("/header-footer/footer.html")
          .then((response) => response.text())
          .then((data) => {
            document.querySelector("#footer").innerHTML = data;
          })
      ]).then(initToggleMenu); // fetch完了後に初期化
    });
  
    function initToggleMenu() {
      const $button = document.querySelector('.toggle-menu-button');
      const $menu = document.querySelector('.header-nav');
      
      if ($button && $menu) {
        $button.addEventListener('click', function () {
          $menu.classList.toggle('is-show');
        });
      }
    }
  </script>

</body>

</html>
